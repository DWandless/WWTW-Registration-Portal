name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 1 */1 * *"   # Every 3 days at 03:00 UTC
  workflow_dispatch:        # Allows manual run

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "https://ucwqdzjiuwdaddwajbxb.supabase.co/rest/v1/members?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
